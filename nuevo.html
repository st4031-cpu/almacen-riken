<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Nuevo Material</title>

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<header>

<h1>➕ Nuevo Material</h1>

</header>

<div class="contenedor">

<div class="card">

<label>Nombre</label>
<input id="nombre" type="text">

<br><br>

<label>Código</label>
<input id="codigo" type="text">

<br><br>

<label>Cantidad</label>
<input id="cantidad" type="number" value="0">

<br><br>

<label>Rack</label>

<select id="rack">

    <option value="">Cargando racks...</option>

</select>

<br><br>

<label>Descripción</label>

<textarea
id="descripcion"
rows="5"></textarea>

<br><br>

<label>Stock mínimo</label>
<input id="minimo" type="number" value="0">

<br><br>

<label>Categoría</label>

<select id="color">

<option value="azul">⚡ Eléctrico (Azul)</option>

<option value="morado">🤖 Automatización (Morado)</option>

<option value="verde">💨 Neumática (Verde)</option>

<option value="naranja">🚰 Hidráulica / Tubería (Naranja)</option>

<option value="cafe">🔧 Mecánico (Café)</option>

<option value="amarillo">🦺 Seguridad (Amarillo)</option>

<option value="gris">📦 Consumibles (Gris)</option>

<option value="rojo">🚨 Material Crítico (Rojo)</option>

<option value="turquesa">🌐 Redes / Comunicaciones (Turquesa)</option>

<option value="rosa">📏 Instrumentación (Rosa)</option>

<option value="blanco">📄 Documentación (Blanco)</option>

<option value="negro">🛠 Herramientas (Negro)</option>

</select>

<br><br>

<button id="guardar">

Guardar Material

</button>

<br><br>

<button id="cancelar">

Cancelar

</button>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="js/config.js"></script>

<script src="js/nuevo.js"></script>

</body>

</html>
