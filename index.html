<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Control de Inventario QR</title>


<link rel="stylesheet" href="css/style.css">


</head>

<body>

<header class="headerLogo">

<img
src="img/logo-riken-energias.png"
class="logoEmpresa">

<div>

<h1>Control de Inventario QR</h1>

<p>Área de Energías</p>

</div>

</header>

<div class="contenedor">

<!--================ DASHBOARD =================-->

<div class="dashboard">

<div class="dashboardCard">

<h2 id="totalMateriales">0</h2>

<p>📦 Materiales</p>

</div>

<div class="dashboardCard">

<h2 id="entradasHoy">0</h2>

<p>📥 Entradas</p>

</div>

<div class="dashboardCard">

<h2 id="salidasHoy">0</h2>

<p>📤 Salidas</p>

</div>

<div class="dashboardCard alerta">

<h2 id="stockBajo">0</h2>

<p>⚠ Stock Bajo</p>

</div>

</div>

<!--================ BOTONES =================-->

<div class="botonesAcciones">

<button id="nuevoRack">

📁 Nuevo Rack

</button>

<button id="verHistorial">

📋 Historial

</button>

<button id="excelInventario">

📊 Inventario

</button>

<button id="excelMovimientos">

📑 Historial Excel

</button>

</div>

<!--================ BUSCADOR =================-->

<input

type="text"

id="buscarRack"

placeholder="🔍 Buscar Rack...">

<br><br>
<div class="card">

    <h2>⚠ Materiales por reponer</h2>

    <div id="listaStockBajo">

        <p>Todo el inventario está correcto.</p>

    </div>

</div>

<br>
<!--================ LISTA DE RACKS =================-->

<div id="listaRacks"></div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>


<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<script src="js/config.js"></script>

<script src="js/app.js"></script>

</body>

</html>
