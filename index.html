<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>RIKEN ALMACÉN</title>

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<header>

<h1>📦 RIKEN ALMACÉN</h1>

</header>

<div class="contenedor">

<!---------------- DASHBOARD ---------------->

<div class="dashboard">

    <div class="dashboardCard">

        <h2 id="totalMateriales">0</h2>

        <p>📦 Materiales registrados</p>

    </div>

    <div class="dashboardCard">

        <h2 id="entradasHoy">0</h2>

        <p>📥 Entradas hoy</p>

    </div>

    <div class="dashboardCard">

        <h2 id="salidasHoy">0</h2>

        <p>📤 Salidas hoy</p>

    </div>

    <div class="dashboardCard alerta">

        <h2 id="stockBajo">0</h2>

        <p>⚠ Materiales por reponer</p>

    </div>

</div>

<!------------- MATERIALES POR REPONER ------------->

<div class="card">

    <h2>🔴 Materiales por reponer</h2>

    <div id="listaStockBajo">

        <p>No hay materiales por reponer.</p>

    </div>

</div>

<br>

<input
type="text"
id="buscar"
placeholder="🔍 Buscar material...">

<br><br>

<!------------- BOTONES PRINCIPALES ------------->

<div class="botonesAcciones">

    <button id="nuevoMaterial">

        ➕ Agregar material

    </button>

    <button id="verHistorial">

        📋 Ver Historial

    </button>

    <button id="excelInventario">

        📊 Exportar Inventario

    </button>

    <button id="excelMovimientos">

        📑 Exportar Historial

    </button>

</div>

<!------------- LISTA DE MATERIALES ------------->

<div id="listaMateriales"></div>

</div>

<!-- Librería Supabase -->

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<!-- Librería Excel -->

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<!-- Configuración -->

<script src="js/config.js"></script>

<!-- Código principal -->

<script src="js/app.js"></script>

</body>

</html>
